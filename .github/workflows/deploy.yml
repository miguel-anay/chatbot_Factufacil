name: Deploy to Pro7Tiendas

on:
  push:
    branches: [main]
    # Solo documentación → NO deployar al EC2. Si un push toca ÚNICAMENTE
    # archivos de estas rutas, el workflow entero (test + deploy) se saltea.
    # Un push que mezcle docs + código sí corre (gana el archivo de código).
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'openspec/**'
      - '**.html'
      - '**.pdf'
      - 'LICENSE'

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  test:
    name: Build, boot smoke-test & regression
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t factufacil-chatbot:ci .

      - name: Boot container and wait for /health
        run: |
          docker run -d --name ci-app -p 8000:8000 \
            -e ALIBABA_API_KEY="${{ secrets.ALIBABA_API_KEY }}" \
            factufacil-chatbot:ci

          # Primer arranque carga el modelo de embeddings (~30-50s) antes de levantar.
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null; then
              echo "App levantó OK"
              exit 0
            fi
            echo "[$i/30] esperando arranque..."
            sleep 3
          done

          echo "El container no levantó — logs:"
          docker logs ci-app
          exit 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run functional regression tests
        run: |
          pip install --no-cache-dir requests
          python test_chatbot.py

      - name: Stop container
        if: always()
        run: docker rm -f ci-app || true

  deploy:
    needs: test
    name: Build, push & deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        env:
          IMAGE: ghcr.io/miguel-anay/factufacil-chatbot:${{ github.sha }}
        run: |
          docker build -t $IMAGE .
          docker push $IMAGE
          docker tag $IMAGE ghcr.io/miguel-anay/factufacil-chatbot:latest
          docker push ghcr.io/miguel-anay/factufacil-chatbot:latest

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Deploy via SSM
        env:
          INSTANCE_ID: i-06ed766af4b831cf0
          IMAGE: ghcr.io/miguel-anay/factufacil-chatbot:${{ github.sha }}
        run: |
          COMPOSE_B64=$(base64 -w 0 docker-compose.yml)

          DEPLOY_SCRIPT=$(cat << SCRIPT | base64 -w 0
          #!/bin/bash
          set -e
          export PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/snap/bin
          DEPLOY_DIR=/opt/factufacil-chatbot
          mkdir -p \$DEPLOY_DIR

          GHCR_TOKEN=\$(aws ssm get-parameter --name /factufacil/chatbot/ghcr_token --with-decryption --query Parameter.Value --output text --region us-east-1)
          echo "\$GHCR_TOKEN" | docker login ghcr.io -u miguel-anay --password-stdin

          docker pull $IMAGE

          ALIBABA_API_KEY=\$(aws ssm get-parameter --name /factufacil/chatbot/alibaba_api_key --with-decryption --query Parameter.Value --output text --region us-east-1)
          printf 'ALIBABA_API_KEY=%s\nALIBABA_BASE_URL=https://dashscope-intl.aliyuncs.com/compatible-mode/v1\nLLM_MODEL=qwen-plus\n' "\$ALIBABA_API_KEY" > \$DEPLOY_DIR/.env

          echo "$COMPOSE_B64" | base64 -d > \$DEPLOY_DIR/docker-compose.yml

          IMAGE=$IMAGE docker compose -f \$DEPLOY_DIR/docker-compose.yml up -d
          SCRIPT
          )

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --parameters "commands=[\"echo $DEPLOY_SCRIPT | base64 -d | bash\"]" \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          for i in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query Status --output text 2>/dev/null || echo "Pending")
            echo "[$i/60] Status: $STATUS"
            if [[ "$STATUS" == "Success" ]]; then break; fi
            if [[ "$STATUS" == "Failed" || "$STATUS" == "Cancelled" || "$STATUS" == "TimedOut" ]]; then
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --query '{Output:StandardOutputContent,Errors:StandardErrorContent}'
              exit 1
            fi
            sleep 10
          done

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query '{Status:Status,Output:StandardOutputContent,Errors:StandardErrorContent}'
